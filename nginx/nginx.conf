worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 3300;
        server_name _;

        # API — forward /api/* to the api container
        location /api/ {
            set $api_upstream http://api:4000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
        }

        # Admin UI — pass full path including /admin/ prefix to inner nginx
        location = /admin {
            return 301 /admin/;
        }
        location /admin/ {
            set $admin_upstream http://admin-ui:3000;
            proxy_pass $admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        # Display UI — pass full path including /display/ prefix to inner nginx
        location = /display {
            return 301 /display/;
        }
        location /display/ {
            set $display_upstream http://display-ui:3001;
            proxy_pass $display_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        # Root redirect
        location = / {
            return 301 /admin/;
        }
    }
}
