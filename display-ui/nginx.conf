server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # --- Long-lived cache for hashed assets (JS/CSS/fonts/images) ---
    location ~* /assets/ {
        rewrite ^/display/(.*)$ /$1 last;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Rewrite /display/* -> /* for all other paths ---
    location /display/ {
        rewrite ^/display/(.*)$ /$1 last;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
